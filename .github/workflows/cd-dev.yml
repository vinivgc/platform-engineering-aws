name: CD - Dev

on:
  workflow_run:
    workflows:
      - CI - Build and Push
    types:
      - completed

permissions:
  id-token: write
  contents: read

env:
  RELEASE_NAME: ${{ vars.RELEASE_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  CHART_PATH: ${{ vars.CHART_PATH }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}

concurrency:
  group: cd-dev
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag
        run: echo "IMAGE_TAG=sha-$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install $RELEASE_NAME $CHART_PATH \
            --namespace $K8S_NAMESPACE \
            --create-namespace \
            -f k8s/values/sample-app/dev.yaml \
            --set image.tag=$IMAGE_TAG

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/$RELEASE_NAME -n $K8S_NAMESPACE --timeout=180s
          kubectl get pods -n $K8S_NAMESPACE
          kubectl get svc -n $K8S_NAMESPACE