image:
  repository: platform-engineering-aws-ecr
  registry: 319895613301.dkr.ecr.eu-west-1.amazonaws.com
  tag: "specified"
  pullPolicy: IfNotPresent

workloadProfile: important

ingress:
  enabled: true
  host: ""
  visibility: public

security:
  profile: restricted

scaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10

availability:
  profile: critical

config:
  appEnv: prod
  appMessage: "Hello from production"
  readinessDelaySeconds: "3"
  requireMessage: "true"