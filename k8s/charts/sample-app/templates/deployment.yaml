apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "sample-app.labels" . | nindent 4  }}
  name: {{ include "sample-app.fullname" . }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.deployment.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sample-app.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "sample-app.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- if eq .Values.security.profile "restricted" }}
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
        {{- else }}
        seccompProfile:
          type: RuntimeDefault
        {{- end }}
      containers:
      - image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        name: {{ include "sample-app.name" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.application.port }}
          protocol: TCP
        envFrom:
          - configMapRef:
              name: {{ include "sample-app.fullname" . }}
        {{- if .Values.resources }}
        securityContext:
          {{- if eq .Values.security.profile "restricted" }}
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          {{- else }}
          allowPrivilegeEscalation: false
          {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- else if eq .Values.workloadProfile "critical" }}
        resources:  
          requests:
            cpu: 300m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        {{- else if eq .Values.workloadProfile "important" }}
        resources:
          requests:
            cpu: 200m
            memory: 192Mi
          limits:
            cpu: 400m
            memory: 384Mi
        {{- else }}
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        {{- end }}
        startupProbe:
          httpGet:
            path: {{ .Values.application.probes.startupPath }}
            port: {{ .Values.application.port }}
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: {{ .Values.application.probes.livenessPath }}
            port: {{ .Values.application.port }}
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: {{ .Values.application.probes.readinessPath }}
            port: {{ .Values.application.port }}
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3