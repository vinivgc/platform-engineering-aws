{{- if .Values.scaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sample-app.fullname" . }}
  labels:
    {{- include "sample-app.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sample-app.fullname" . }}
  minReplicas: {{ .Values.scaling.minReplicas }}
  maxReplicas: {{ .Values.scaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.scaling.targetCPUUtilizationPercentage }}
    {{- if .Values.scaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.scaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{- if eq .Values.scaling.profile "aggressive" }} 0
        {{- else if eq .Values.scaling.profile "conservative" }} 60
        {{- else }} 0
        {{- end }}
      selectPolicy: Max
      policies:
        {{- if eq .Values.scaling.profile "aggressive" }}
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
        {{- else if eq .Values.scaling.profile "conservative" }}
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
        {{- else }}
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
        {{- end }}
    scaleDown:
      stabilizationWindowSeconds: {{- if eq .Values.scaling.profile "aggressive" }} 120
        {{- else if eq .Values.scaling.profile "conservative" }} 600
        {{- else }} 300
        {{- end }}
      selectPolicy: Max
      policies:
        {{- if eq .Values.scaling.profile "aggressive" }}
        - type: Percent
          value: 100
          periodSeconds: 60
        {{- else if eq .Values.scaling.profile "conservative" }}
        - type: Percent
          value: 25
          periodSeconds: 60
        {{- else }}
        - type: Percent
          value: 50
          periodSeconds: 60
        {{- end }}
{{- end }}