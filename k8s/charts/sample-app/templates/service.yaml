apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "sample-app.labels" . | nindent 4 }}
  name: {{ include "sample-app.fullname" . }}
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sample-app.selectorLabels" . | nindent 4 }}
  type: ClusterIP