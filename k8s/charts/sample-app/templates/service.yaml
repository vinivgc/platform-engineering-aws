apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if eq .Values.exposure.type "public" }}
  type: LoadBalancer
  {{- else }}
  type: ClusterIP
  {{- end }}