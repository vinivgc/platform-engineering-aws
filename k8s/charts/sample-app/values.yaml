nameOverride: ""
fullnameOverride: ""

deployment:
  replicas: 1

image:
  repository: platform-engineering-aws-ecr
  registry: 319895613301.dkr.ecr.eu-west-1.amazonaws.com
  tag: "latest"
  pullPolicy: IfNotPresent

application:
  port: 5000
  healthPath: /health

ingress:
  enabled: false
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  host: ""
  path: /
  pathType: Prefix

# workloadProfile defines standard resource sizing
# general   = small workloads
# important = medium workloads
# critical  = high-priority workloads
#
# Most services should use workloadProfile.
# Use 'resources' only if you need fine-grained control.
workloadProfile: general
# optional override
resources: {}

env:
  - name: APP_ENV
    value: default